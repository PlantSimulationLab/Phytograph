  - User Guide:
      - guide/index.md
      - Install Phytograph: guide/install.md
      - Your first import: guide/first-import.md
      - Tour of the interface: guide/interface-tour.md
      - Reporting bugs & requesting features: guide/feedback.md
  - Concepts:
      - concepts/index.md
      - Scans: concepts/scans.md
      - Point clouds: concepts/point-clouds.md
      - Meshes: concepts/meshes.md
      - Skeletons: concepts/skeletons.md
      - QSM (Quantitative Structure Model): concepts/qsm.md
      - Plant models: concepts/plant-models.md
      - Leaf area density: concepts/leaf-area-density.md
  - Workflows:
      - workflows/index.md
      - Getting around:
          - Import & export: workflows/import-export.md
          - Export from RiPROCESS: workflows/export-from-riprocess.md
          - Viewer navigation: workflows/viewer-navigation.md
      - 1. Pre-processing:
          - Clean a point cloud: workflows/clean-point-cloud.md
          - Backfill misses: workflows/backfill-misses.md
          - Register & compare: workflows/register-compare.md
      - 2. Segmentation:
          - Segment ground points: workflows/segment-ground.md
          - Separate leaf and wood: workflows/segment-wood.md
          - Segment individual trees: workflows/segment-trees.md
      - 3. Reconstruction & analysis:
          - Triangulate a mesh: workflows/triangulate.md
          - Generate a DEM: workflows/generate-dem.md
          - Extract a skeleton: workflows/extract-skeleton.md
          - Build a QSM: workflows/build-qsm.md
          - Add leaves to a QSM: workflows/add-leaves.md
          - Adjust leaf angles: workflows/adjust-leaf-angles.md
          - Estimate leaf area density: workflows/estimate-leaf-area-density.md
      - 4. Scan simulation:
          - Generate a plant: workflows/generate-plant.md
          - Morph a plant: workflows/morph-plant.md
          - Simulate a LiDAR scan: workflows/simulate-scan.md
  - Reference:
      - reference/index.md
      - File formats: reference/file-formats.md
      - Color modes: reference/color-modes.md
      - Keyboard shortcuts: reference/shortcuts.md
  - For Developers:
      - developers/index.md
      - Getting started:
          - developers/getting-started/index.md
          - Installation: developers/getting-started/installation.md
          - First run: developers/getting-started/first-run.md
      - Architecture:
          - developers/architecture/index.md
          - Processes & IPC: developers/architecture/processes.md
          - Backend sidecar: developers/architecture/backend.md
          - Version lock: developers/architecture/version-lock.md
      - Development:
          - developers/development/index.md
          - Dev loop: developers/development/dev-loop.md
          - Building installers: developers/development/building.md
          - Releasing: developers/development/releasing.md
          - Testing: developers/development/testing.md
      - Backend API:
