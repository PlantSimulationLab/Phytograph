site_name: Phytograph
site_description: A desktop application for working with LiDAR point clouds, plant meshes, skeletons, and procedural plant models.
site_url: https://plantsimulationlab.github.io/phytograph/
repo_url: https://github.com/PlantSimulationLab/phytograph
repo_name: PlantSimulationLab/phytograph
edit_uri: edit/main/docs/docs/

docs_dir: docs

theme:
  name: material
  # Custom theme dir — holds .icons/phytograph/*.svg so docs can use the same
  # glyphs as the app (e.g. :phytograph-qsm: for the QSM branching-tree icon).
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/phytograph.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../backend-api
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            heading_level: 3

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - ..
      check_paths: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        # Register the custom icon dir so :phytograph-qsm: (overrides/.icons/
        # phytograph/qsm.svg) resolves alongside the bundled Material icons.
        custom_icons:
          - overrides/.icons

nav:
