name: Docs

# Builds the MkDocs Material site under docs/ and publishes it to GitHub
# Pages. Triggers on push to main when docs/, the README, or this workflow
# itself change — and on manual dispatch from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs + plugins
        run: pip install -r docs/requirements.txt

      # Not --strict: griffe emits warnings on a few docstring quirks in the
      # ~5000-line backend-api/main.py. The nav and structural checks below
      # are what we actually care about; treat content warnings as advisory.
      - name: Build site
        working-directory: docs
        run: mkdocs build --site-dir _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
