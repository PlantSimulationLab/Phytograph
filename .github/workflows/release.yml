name: Release

# Repo layout: the desktop app code lives at the repo root; the Python
# backend lives in `backend-api/`. This workflow builds both, signs and
# notarizes the macOS app, and publishes a draft GitHub Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            arch: arm64
            backend_name: phytograph_backend
          - platform: windows-latest
            arch: x64
            backend_name: phytograph_backend

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend-api/requirements.txt

      - name: Cache PyInstaller backend
        id: backend-cache
        uses: actions/cache@v4
        with:
          path: resources/${{ matrix.backend_name }}
          key: backend-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('backend-api/**/*.py', 'backend-api/requirements.txt') }}

      - name: Install Python dependencies
        if: steps.backend-cache.outputs.cache-hit != 'true'
        working-directory: backend-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python backend
        if: steps.backend-cache.outputs.cache-hit != 'true'
        run: node scripts/build-backend.mjs

      - name: Verify backend binary
        shell: bash
        run: |
          ls -la resources/${{ matrix.backend_name }}
          du -sh resources/${{ matrix.backend_name }}

      # ---------------- macOS signing setup ----------------
      - name: Import Apple Certificate (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Sign Python backend (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime --timestamp \
            --entitlements build/backend.entitlements \
            --sign "$APPLE_SIGNING_IDENTITY" \
            resources/phytograph_backend/phytograph_backend
          codesign -dv --verbose=4 resources/phytograph_backend/phytograph_backend

      # ---------------- App build ----------------
      - name: Install frontend dependencies
        run: npm ci

      - name: Build & publish app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows signing (optional — leave empty to skip)
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run release
