name: Release

# Repo layout: the desktop app code lives at the repo root; the Python
# backend lives in `backend-api/`. This workflow builds both, signs and
# notarizes the macOS app, and publishes a draft GitHub Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            arch: arm64
            backend_name: phytograph_backend
          # Pinned to windows-2022 (not windows-latest): PyHelios's CMake build
          # detects the "Visual Studio 17 2022" generator, but windows-latest
          # now ships VS 18, so the generator can't find a matching install and
          # configure fails. windows-2022 is the combo PyHelios's own CI uses
          # (pyhelios/.github/workflows/pytest-windows.yml). Revisit when
          # PyHelios's build_helios.py learns to detect VS 18, or when GitHub
          # retires the windows-2022 image.
          - platform: windows-2022
            arch: x64
            backend_name: phytograph_backend
          # Pinned to ubuntu-24.04 (not ubuntu-latest) to match the image
          # PyHelios's own CI builds on (pyhelios/.github/workflows/
          # pytest-linux.yml) and to avoid a surprise image bump (cf. the VS 18
          # break on windows-latest).
          - platform: ubuntu-24.04
            arch: x64
            backend_name: phytograph_backend

    runs-on: ${{ matrix.platform }}
    # 150 min (not 75): macOS notarization waits on Apple's notary service,
    # whose queue can be slow — a brand-new account's *first* submission has
    # sat "In Progress" for over an hour. The native builds (PyHelios, backend,
    # PotreeConverter) finish well inside 75 min; the headroom is purely to
    # avoid cancelling a good build while Apple processes notarization.
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4
        with:
          # PyHelios is a source submodule (with its nested helios-core C++
          # submodule); the backend builds the native libhelios from it.
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend-api/requirements.txt

      # Activate the MSVC toolchain on Windows. The PyHelios and PotreeConverter
      # CMake builds use the "Visual Studio 17 2022" generator, which fails with
      # "could not find any instance of Visual Studio" unless the VS Developer
      # environment (vcvars) is on PATH. The hosted runner has VS installed but
      # doesn't activate it for plain `run:` steps, so do it explicitly here.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Native build headers the Linux runner doesn't ship: OpenGL + X11 dev
      # headers for the PyHelios visualizer/lidar plugin (build-pyhelios.mjs),
      # and Intel TBB for PotreeConverter (build-potree-converter.mjs probes it
      # via `pkg-config --exists tbb` and errors out if missing). cmake and the
      # C++ toolchain are already present on ubuntu-latest. macOS/Windows ship
      # these via the system frameworks, so this step is Linux-only.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # libgl1-mesa-dev + xorg-dev: build-time GL/X11 headers (above).
          # libglu1-mesa-dev: GLU headers (GL/glu.h) — the visualizer plugin's
          # bundled glew pulls it in, and it's a separate package from libgl.
          # xvfb: a virtual X display for the runtime backend smoke test —
          # importing libhelios links the visualizer's GL symbols, so give it a
          # framebuffer in case the load path touches a display on a headless runner.
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev xorg-dev libtbb-dev xvfb libfuse2t64

      # Pin the cache to the exact PyHelios + helios-core commits so bumping
      # either submodule rebuilds the bundled native library.
      - name: Record submodule SHAs
        id: submodules
        shell: bash
        run: |
          echo "sha=$(git -C pyhelios rev-parse HEAD)-$(git -C pyhelios/helios-core rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache PyInstaller backend
        id: backend-cache
        uses: actions/cache@v4
        with:
          path: resources/${{ matrix.backend_name }}
          # `-cuda` marks the GPU-enabled backend: bumping it (or any change
          # that should force a fresh backend) invalidates pre-GPU CPU-only
          # caches so the next build actually recompiles with CUDA.
          key: backend-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('backend-api/**/*.py', 'backend-api/requirements.txt') }}-pyhelios-${{ steps.submodules.outputs.sha }}-cuda

      - name: Install Python dependencies
        if: steps.backend-cache.outputs.cache-hit != 'true'
        working-directory: backend-api
        run: |
          python -m pip install --upgrade pip
          # phytorch-lib depends on torch, but the backend only uses it for CPU
          # curve-fitting (stomatal/hydraulic models) — there is no torch.cuda /
          # GPU usage anywhere. On Linux `pip install torch` defaults to the CUDA
          # wheel (bundles cuDNN/cuBLAS/cu*.so ≈ 2-3 GB of dead weight), which
          # pushed the packaged Linux AppImage past GitHub's 2 GiB asset limit.
          # Pre-install the CPU-only torch wheel so phytorch-lib's dependency is
          # already satisfied and pip doesn't pull the CUDA build. (macOS already
          # gets CPU torch — no CUDA wheels exist for it; Windows is unaffected.)
          if [ "$RUNNER_OS" = "Linux" ]; then
            pip install torch --index-url https://download.pytorch.org/whl/cpu
          fi
          pip install -r requirements.txt
          pip install pyinstaller

      # GPU acceleration (Windows + Linux): install the CUDA toolkit so Helios's
      # collisiondetection plugin compiles its CUDA ray-tracing path. CMake's
      # `find_package(CUDAToolkit)` then defines HELIOS_CUDA_AVAILABLE and builds
      # CollisionDetection.cu. Key facts that make this safe on GPU-less runners
      # and GPU-less end users alike:
      #   - The runner has no physical GPU, but architecture selection uses
      #     `nvcc --list-gpu-code` (detect_GPU_compute.cmake) — the compiler's
      #     capability list, not the hardware — so the build needs no GPU.
      #   - cudart is linked STATICALLY (collisiondetection CMakeLists:
      #     CUDA::cudart_static), so the shipped libhelios bundles no CUDA
      #     DLLs/.so and requires no CUDA install on the user's machine. With no
      #     NVIDIA driver/GPU, cudaGetDeviceCount() returns an error and Helios
      #     falls back to CPU/OpenMP automatically.
      # macOS has no CUDA and stays CPU-only (the step is skipped there). Only
      # runs on a cache miss, i.e. when we actually rebuild the backend.

      # CUDA's full network install needs several GB and the Linux runner's root
      # disk is already tight (see the swap step below), so reclaim preinstalled
      # bloat the build never uses before installing.
      - name: Free disk space for CUDA (Linux)
        if: runner.os == 'Linux' && steps.backend-cache.outputs.cache-hit != 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false   # keep Python/Node toolchains the build needs
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false # the swap step below manages swap itself

      # Linux: install ONLY the CUDA compiler + libraries we compile against, not
      # the full `cuda` meta-package. The v0.46.0 run failed here because the full
      # package pulls in `cuda-runtime-12-6`, which depends on the NVIDIA GPU
      # kernel driver `nvidia-open-560` — that can't configure on a GPU-less
      # hosted runner, so dpkg aborts (exit 100). We don't need the driver to
      # BUILD libhelios (nvcc resolves target archs via `nvcc --list-gpu-code`;
      # cudart is linked statically). `sub-packages: ["nvcc"]` + the cudart dev
      # libs give a driver-free toolkit (network method is required for sub-package
      # selection on Linux).
      - name: Install CUDA Toolkit (Linux)
        if: runner.os == 'Linux' && steps.backend-cache.outputs.cache-hit != 'true'
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev", "cudart"]'
          use-github-cache: true
          use-local-cache: true

      # Windows: the full network install works there (no apt/driver dpkg step),
      # and building the CUDA path wants the standard toolkit layout.
      - name: Install CUDA Toolkit (Windows)
        if: runner.os == 'Windows' && steps.backend-cache.outputs.cache-hit != 'true'
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.6.2'
          method: 'network'
          use-github-cache: true
          use-local-cache: true

      - name: Verify CUDA (Windows + Linux)
        if: runner.os != 'macOS' && steps.backend-cache.outputs.cache-hit != 'true'
        run: nvcc -V

      # The CUDA apt install above REMOVES the mesa/GLVND/X11 dev packages (apt
      # resolved a conflict by uninstalling libgl1-mesa-dev / libglvnd-dev /
      # libopengl-dev / libx11-dev etc.), so the visualizer plugin's bundled glew
      # then fails `find_package(OpenGL)` with "missing: OPENGL_opengl_LIBRARY
      # OPENGL_glx_LIBRARY OPENGL_INCLUDE_DIR". Re-install the GL/X11 headers AFTER
      # CUDA so they're present when libhelios configures. (The earlier "Install
      # Linux build dependencies" step installs them too, but CUDA runs after it.)
      - name: Re-install GL/X11 dev headers after CUDA (Linux)
        if: runner.os == 'Linux' && steps.backend-cache.outputs.cache-hit != 'true'
        # Re-install the SAME set the "Install Linux build dependencies" step did
        # (CUDA's apt transaction removed them). Must include xvfb + libtbb-dev,
        # not just the GL headers: xvfb-run wraps the packaged-backend smoke test
        # (its removal made that step fail with "xvfb-run: command not found",
        # misreported as a backend crash-on-startup), and libtbb-dev is a build dep.
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev xorg-dev libtbb-dev xvfb libfuse2t64

      # Compile the PyHelios native library (libhelios) and editable-install the
      # package so PyInstaller's collect-all picks it up. plantarchitecture +
      # lidar plugins; --nogpu drops only the gpu_required plugins (radiation/
      # OptiX), which we don't use — it does NOT disable the collisiondetection
      # CUDA path, which auto-enables whenever the CUDA toolkit installed above
      # is present (so Windows/Linux builds are GPU-accelerated; macOS is
      # CPU-only). (lidar pulls in the visualizer + OpenGL at the C++ level,
      # which builds with no extra packages on macOS/Windows; on Linux the
      # GL/X11 dev headers come from the "Install Linux build dependencies" step
      # above.) Runners provide cmake + a C++ toolchain (Xcode CLT on macOS,
      # MSVC on Windows, gcc on Linux). On Windows/Linux we pass --require-gpu so
      # the build FAILS LOUDLY if the CUDA path didn't compile (e.g. the toolkit
      # install above silently failed) rather than shipping a CPU-only installer
      # that masquerades as GPU-capable. macOS has no CUDA, so it never gets the
      # flag.
      - name: Build PyHelios from source
        if: steps.backend-cache.outputs.cache-hit != 'true'
        run: node scripts/build-pyhelios.mjs ${{ runner.os != 'macOS' && '--require-gpu' || '' }}

      # Free disk + enlarge swap on Linux before the PyInstaller backend build.
      # The Linux job kept dying during "Build Python backend" — the signature
      # of an OOM kill during PyInstaller's analysis of the large collect-all
      # packages (scipy + open3d + skimage + pye57 …), whose peak exceeds the
      # ~7.8 GB RAM these runners have. But the FIRST fix attempts failed at the
      # swap step itself with "dd: No space left on device": after the PyHelios
      # build the root disk was already 95% full (4.2 GB free of 72 GB), so a
      # big swapfile couldn't be written — and swapoff -a had already removed
      # the runner's default 3 GB swap, leaving it WORSE off.
      #
      # So: (1) reclaim ~20-30 GB of preinstalled bloat the build doesn't need
      # (dotnet, Android SDK, GHC, CodeQL), THEN (2) swapoff, rebuild /swapfile
      # with dd (not fallocate — it can make a holey file swapon rejects), and
      # swapon. 8 GB swap now fits and gives headroom over the 7.8 GB RAM.
      # `set -x` keeps any failure visible in this step's log.
      - name: Free disk + add swap for PyInstaller (Linux)
        if: runner.os == 'Linux' && steps.backend-cache.outputs.cache-hit != 'true'
        run: |
          set -x
          echo "== disk BEFORE cleanup =="
          df -h / || true
          # Reclaim large preinstalled toolchains the backend build never uses.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          echo "== disk AFTER cleanup =="
          df -h / || true
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "== memory/disk AFTER (expect ~8G swap) =="
          free -h || true
          df -h / || true

      - name: Build Python backend
        if: steps.backend-cache.outputs.cache-hit != 'true'
        run: node scripts/build-backend.mjs

      - name: Report memory after backend build (Linux)
        # always() so we capture peak/leftover state even if the build failed.
        if: always() && runner.os == 'Linux' && steps.backend-cache.outputs.cache-hit != 'true'
        run: free -h || true; df -h / || true

      - name: Verify backend binary
        shell: bash
        run: |
          ls -la resources/${{ matrix.backend_name }}
          du -sh resources/${{ matrix.backend_name }}

      # Smoke-test the PACKAGED backend, not the source: launch the PyInstaller
      # binary exactly as the shipped app's supervisor (src/main/backend.ts)
      # does — pass PHYTOGRAPH_BACKEND_PORT, poll /version until it answers,
      # and assert the version matches package.json (the version-lock contract).
      # This catches a bundle that builds but is dead on arrival — a missing
      # hidden import, a libhelios that won't load, an open3d/scipy native dep
      # that didn't get collected — the failure mode `ls`/`du` can't see. Runs
      # on every job (no cache-hit guard) so a cached-but-broken bundle is
      # caught too. Cold start unpacks PyInstaller + imports open3d/scipy/
      # pyhelios, so allow a generous poll window.
      - name: Smoke-test backend (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          PHYTOGRAPH_BACKEND_PORT: '8123'
        run: |
          set -euo pipefail
          expected=$(node -p "require('./package.json').version")
          echo "Expected backend version: $expected"
          # On headless Linux, run under a virtual framebuffer in case loading
          # libhelios's GL symbols touches a display. macOS has a native display
          # path and needs no wrapper.
          launcher=""
          if [ "$RUNNER_OS" = "Linux" ]; then launcher="xvfb-run -a"; fi
          $launcher ./resources/${{ matrix.backend_name }}/${{ matrix.backend_name }} &
          backend_pid=$!
          # Ensure the backend is killed however this step exits.
          trap 'kill "$backend_pid" 2>/dev/null || true' EXIT

          got=""
          for i in $(seq 1 60); do
            if ! kill -0 "$backend_pid" 2>/dev/null; then
              echo "FAIL: backend process exited before serving (crash on startup)"
              exit 1
            fi
            resp=$(curl -fsS "http://127.0.0.1:${PHYTOGRAPH_BACKEND_PORT}/version" 2>/dev/null || true)
            if [ -n "$resp" ]; then
              echo "Backend responded after ~${i}s: $resp"
              got=$(node -p "JSON.parse(process.argv[1]).version" "$resp")
              break
            fi
            sleep 1
          done

          if [ -z "$got" ]; then
            echo "FAIL: backend never answered /version within 60s"
            exit 1
          fi
          if [ "$got" != "$expected" ]; then
            echo "FAIL: backend version '$got' != package.json '$expected'"
            exit 1
          fi
          echo "PASS: packaged backend launched and reported version $got"

      - name: Smoke-test backend (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PHYTOGRAPH_BACKEND_PORT: '8123'
        run: |
          $ErrorActionPreference = 'Stop'
          $expected = (Get-Content package.json | ConvertFrom-Json).version
          Write-Host "Expected backend version: $expected"
          $exe = "resources/${{ matrix.backend_name }}/${{ matrix.backend_name }}.exe"
          $proc = Start-Process -FilePath $exe -PassThru
          try {
            $got = $null
            foreach ($i in 1..60) {
              if ($proc.HasExited) {
                Write-Host "FAIL: backend process exited before serving (crash on startup)"
                exit 1
              }
              try {
                $resp = Invoke-RestMethod -Uri "http://127.0.0.1:$env:PHYTOGRAPH_BACKEND_PORT/version" -TimeoutSec 2
                $got = $resp.version
                Write-Host "Backend responded after ~${i}s: version $got"
                break
              } catch {
                Start-Sleep -Seconds 1
              }
            }
          } finally {
            if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }
          }
          if (-not $got) {
            Write-Host "FAIL: backend never answered /version within 60s"
            exit 1
          }
          if ($got -ne $expected) {
            Write-Host "FAIL: backend version '$got' != package.json '$expected'"
            exit 1
          }
          Write-Host "PASS: packaged backend launched and reported version $got"

      # ---------------- PotreeConverter build ----------------
      # PotreeConverter converts XYZ/LAS to the Potree 2.0 octree format the
      # renderer streams. It's a C++ binary, built from source per platform.
      # The build needs upstream PR #686 (libc++ compile fix); the build
      # script fetches and applies it. Drop the patch step when #686 merges.
      - name: Compute PotreeConverter cache key (Unix)
        if: runner.os != 'Windows'
        id: potree-key-unix
        shell: bash
        run: |
          # macOS runners have `shasum`, not GNU `sha256sum`; Linux has both.
          # Pick whichever exists so this one step works on macOS and Linux.
          if command -v sha256sum >/dev/null; then
            script_hash=$(sha256sum scripts/build-potree-converter.mjs | cut -d' ' -f1)
          else
            script_hash=$(shasum -a 256 scripts/build-potree-converter.mjs | cut -d' ' -f1)
          fi
          echo "key=$script_hash" >> "$GITHUB_OUTPUT"

      - name: Compute PotreeConverter cache key (Windows)
        if: runner.os == 'Windows'
        id: potree-key-win
        shell: pwsh
        run: |
          $hash = (Get-FileHash scripts/build-potree-converter.mjs -Algorithm SHA256).Hash
          echo "key=$hash" >> $env:GITHUB_OUTPUT

      - name: Cache PotreeConverter binary
        id: potree-cache
        uses: actions/cache@v4
        with:
          path: resources/potree_converter
          # Pinned to PR #686. Bump the suffix or rotate the key when
          # tracking a different patchset.
          key: potree-${{ runner.os }}-${{ matrix.arch }}-pr686-${{ steps.potree-key-unix.outputs.key || steps.potree-key-win.outputs.key }}

      - name: Install TBB (macOS)
        if: steps.potree-cache.outputs.cache-hit != 'true' && startsWith(matrix.platform, 'macos')
        run: brew install tbb

      - name: Build PotreeConverter
        if: steps.potree-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-potree-converter.mjs

      - name: Verify PotreeConverter binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -uo pipefail
          bin=$(find resources/potree_converter -type f -name 'PotreeConverter' | head -1)
          if [ -z "$bin" ]; then
            echo "FAIL: no PotreeConverter binary under resources/potree_converter/"
            ls -laR resources/potree_converter || true
            exit 1
          fi
          echo "found: $bin"
          ls -la "$(dirname "$bin")"
          # Run the binary to confirm it actually LOADS — this catches the
          # missing-sibling-dylib bug (dyld "Library not loaded: @rpath/
          # liblaszip.dylib" → Abort trap: 6). PotreeConverter exits non-zero
          # from --help, so we only treat a 134/139 (abort/segv = load failure)
          # as fatal; a normal non-zero --help exit is fine.
          set +e
          out=$("$bin" --help 2>&1); rc=$?
          set -e
          echo "$out" | head -5
          echo "exit code: $rc"
          if [ "$rc" -ge 128 ]; then
            echo "FAIL: PotreeConverter crashed on launch (rc=$rc) — likely a missing bundled library"
            otool -L "$bin" 2>/dev/null || true
            exit 1
          fi
          echo "PASS: PotreeConverter launches"

      - name: Verify PotreeConverter binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Path resources/potree_converter -Recurse -Filter 'PotreeConverter.exe' | Select-Object -First 1
          if (-not $bin) {
            Write-Host "FAIL: no PotreeConverter.exe under resources/potree_converter/"
            Get-ChildItem -Path resources/potree_converter -Recurse
            exit 1
          }
          Write-Host "found: $($bin.FullName)"
          # PotreeConverter exits non-zero from --help. The binary having built
          # + installed is the real check, so --help is informational only.
          # Don't run it through the pwsh step at all: even inside try/catch it
          # leaves $LASTEXITCODE non-zero, and the step wrapper (pwsh -command)
          # returns THAT as the step's exit code after the script ends — which
          # failed the step despite our PASS line. Skip --help and exit 0
          # explicitly so the step's result is ours, not PotreeConverter's.
          Write-Host "PASS: PotreeConverter.exe present ($($bin.Length) bytes)"
          exit 0

      # ---------------- macOS signing setup ----------------
      - name: Import Apple Certificate (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Sign Python backend (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime --timestamp \
            --entitlements build/backend.entitlements \
            --sign "$APPLE_SIGNING_IDENTITY" \
            resources/phytograph_backend/phytograph_backend
          codesign -dv --verbose=4 resources/phytograph_backend/phytograph_backend

      - name: Sign PotreeConverter (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # The converter is a plain CLI binary — same entitlements profile
          # as the backend (hardened runtime + timestamp). Notarization
          # otherwise rejects the bundle for an unsigned executable.
          bin=$(find resources/potree_converter -type f -name 'PotreeConverter' | head -1)
          codesign --force --options runtime --timestamp \
            --entitlements build/backend.entitlements \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$bin"
          codesign -dv --verbose=4 "$bin"

      # ---------------- App build ----------------
      - name: Install frontend dependencies
        run: npm ci

      # Linux ships AppImage (squashfs-compressed; the .deb was uncompressed and
      # exceeded GitHub's 2 GiB release-asset limit for this GPU/open3d/torch
      # bundle). The v0.19.0 AppImage hang was electron-builder's appimagetool
      # FUSE-mounting to finalize the image: hosted ubuntu-24.04 ships fuse3 but
      # appimagetool needs libfuse2 (renamed libfuse2t64 in 24.04, not installed
      # by default), and a missing FUSE mount BLOCKS instead of erroring — hence
      # "hung 30+ min, no output". Two mitigations below: APPIMAGE_EXTRACT_AND_RUN
      # makes the tools extract-and-run instead of FUSE-mounting (the canonical CI
      # fix), and the "Install Linux build dependencies" step installs
      # libfuse2t64 as a belt. timeout-minutes is the safety net the old note
      # asked for: a future stall fails loudly (flushing the step log) instead of
      # burning the whole job budget.
      - name: Build & publish app
        timeout-minutes: 45
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Linux AppImage: never FUSE-mount (avoids the appimagetool hang on
          # hosted runners without a usable libfuse2). No-op on macOS/Windows.
          APPIMAGE_EXTRACT_AND_RUN: '1'
          # macOS code signing + notarization
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows signing (optional — leave empty to skip)
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # macOS electron-builder 25.1.8 hard-links build/icon.icns into the
          # packaged .app and, within a single build, attempts the link twice —
          # the second fails `EEXIST … link build/icon.icns -> release/mac-arm64/
          # Electron.app/…/icon.icns` (it is NOT a stale-dir issue; a clean
          # release/ still hit it). Disabling electron-builder's hard-linking
          # makes it COPY the icon instead, sidestepping the double-link. Harmless
          # on Windows/Linux (they weren't hard-link-failing).
          USE_HARD_LINKS: 'false'
        run: npm run release

      # ---------------- Smoke-test the PACKAGED app ----------------
      # The steps above verify the backend BINARY boots and the .app is
      # notarized, but nothing yet proves the assembled installer produces an
      # app that actually OPENS. This launches the packaged binary under
      # release/ via Playwright's _electron and asserts it doesn't instantly
      # crash: the window opens, the supervised backend answers /version, and
      # the renderer mounts. This is the artifact-level check that would catch
      # a first-launch crash / backend-startup regression a green build hides.
      # Linux needs a virtual display; macOS/Windows have a native one.
      - name: Smoke-test packaged app (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          launcher=""
          if [ "$RUNNER_OS" = "Linux" ]; then launcher="xvfb-run -a"; fi
          $launcher npm run test:smoke-packaged

      - name: Smoke-test packaged app (Windows)
        if: runner.os == 'Windows'
        run: npm run test:smoke-packaged

      # ---------------- Verify macOS notarization ----------------
      # The afterSign hook (scripts/notarize.cjs) *submits* to Apple but
      # silently no-ops if any APPLE_* secret is missing or SKIP_NOTARIZATION
      # is set — so a green "Build & publish" does NOT prove the artifacts are
      # notarized. This step asserts it independently, failing the release
      # rather than shipping a build that trips Gatekeeper on users' machines.
      #
      #   codesign --verify    — the .app is signed with a valid Developer ID
      #                          chain under the hardened runtime.
      #   spctl --assess       — Gatekeeper's own verdict; "accepted /
      #                          source=Notarized Developer ID" is the goal.
      #   stapler validate .app — the notarization ticket is stapled to the
      #                          .app (so first launch works offline). This is
      #                          the authoritative check: electron-builder
      #                          notarizes + staples the .app, then packages
      #                          that stapled .app into the .dmg/.zip. It does
      #                          NOT separately staple the .dmg container, so a
      #                          dmg-level staple is checked only informationally
      #                          (its absence is normal and not a failure).
      - name: Verify macOS notarization
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          set -euo pipefail

          app=$(find release -maxdepth 2 -name '*.app' -type d | head -1)
          if [ -z "$app" ]; then
            echo "FAIL: no .app found under release/"
            find release -maxdepth 2 -name '*.app' -o -name '*.dmg' || true
            exit 1
          fi
          echo "Verifying: $app"

          echo "== codesign --verify =="
          codesign --verify --deep --strict --verbose=2 "$app"

          echo "== codesign signing authority =="
          # Must be signed by a Developer ID Application authority, not adhoc.
          if ! codesign -dvv "$app" 2>&1 | grep -q "Authority=Developer ID Application"; then
            echo "FAIL: .app is not signed with a Developer ID Application certificate"
            codesign -dvv "$app" 2>&1 | grep -i "authority\|signature" || true
            exit 1
          fi

          echo "== spctl --assess (Gatekeeper) =="
          # --assess exits non-zero if Gatekeeper would reject it; capture the
          # human-readable reason too. "source=Notarized Developer ID" confirms
          # the notary ticket is recognized.
          assess=$(spctl --assess --type execute --verbose=4 "$app" 2>&1)
          echo "$assess"
          if ! echo "$assess" | grep -q "source=Notarized Developer ID"; then
            echo "FAIL: .app did not assess as Notarized Developer ID"
            exit 1
          fi

          # Authoritative: the .app must carry a stapled ticket.
          echo "== stapler validate (.app) =="
          xcrun stapler validate "$app"

          # Informational only: electron-builder staples the .app, not the .dmg
          # container, so a missing dmg-level ticket is expected and NOT a
          # failure — the .dmg holds the already-stapled .app. Don't let a
          # non-zero stapler exit kill the step (set -e is active).
          echo "== stapler validate (.dmg artifacts) [informational] =="
          dmgs=$(find release -maxdepth 1 -name '*.dmg' | sort)
          if [ -z "$dmgs" ]; then
            echo "FAIL: no .dmg artifacts found"
            exit 1
          fi
          for dmg in $dmgs; do
            echo "-- $dmg"
            if xcrun stapler validate "$dmg"; then
              echo "   (dmg is stapled)"
            else
              echo "   (dmg not stapled — expected; the .app inside it is stapled)"
            fi
          done

          echo "PASS: macOS build is signed and notarized; the .app is stapled."
