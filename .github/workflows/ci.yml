name: CI

# Runs the test suites on every push and PR. Build/sign/notarize/publish lives
# in release.yml (tag-triggered) — this workflow is purely tests. Linux-only on
# purpose: it's the cheap runner and the logic under test (renderer, backend,
# Electron main) is platform-agnostic. Two jobs:
#   quick — typecheck + frontend unit tests; needs only `npm ci`, fails fast.
#   heavy — backend pytest + Playwright E2E; these share the expensive native
#           prerequisites (libhelios, the PyInstaller backend, PotreeConverter),
#           so they're co-located and build those once, cached between runs.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

# A newer push to the same ref cancels the in-flight CI run — don't pay to test
# a commit that's already been superseded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Fast lane: typecheck + frontend unit tests. No native build, so this gives
  # quick feedback and catches the bulk of regressions cheaply.
  # --------------------------------------------------------------------------
  quick:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        # Submodules NOT needed here: typecheck + vitest don't touch PyHelios.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      # typecheck runs gen:version first (writes src/shared/generated/versionInfo
      # from the submodule SHAs); on a no-submodule checkout that script falls
      # back to placeholder versions, which is fine for a type-only check.
      - name: Typecheck
        run: npm run typecheck

      - name: Frontend unit tests (vitest)
        run: npm run test:unit

  # --------------------------------------------------------------------------
  # Heavy lane: backend pytest + Playwright E2E. Both need the real native
  # stack — E2E drives the PACKAGED supervised backend (not a dev uvicorn), so
  # the full PyInstaller bundle + libhelios + PotreeConverter must be built.
  # The backend/potree caches (same keys as release.yml) make repeat runs cheap.
  # --------------------------------------------------------------------------
  heavy:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      # build-potree-converter.mjs fetches upstream PR #686 via the GH API.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          # PyHelios source submodule (+ nested helios-core); libhelios builds
          # from it, and importing backend-api/main.py loads pyhelios.
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend-api/requirements.txt

      # GL/X11/GLU headers for the PyHelios visualizer/lidar plugin; TBB for the
      # PotreeConverter build; xvfb as a virtual display for the headless
      # Electron app and libhelios's GL symbols at runtime.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev xorg-dev libtbb-dev xvfb

      - name: Record submodule SHAs
        id: submodules
        shell: bash
        run: |
          echo "sha=$(git -C pyhelios rev-parse HEAD)-$(git -C pyhelios/helios-core rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Same cache key as release.yml so CI and release share the bundle.
      - name: Cache PyInstaller backend
        id: backend-cache
        uses: actions/cache@v4
        with:
          path: resources/phytograph_backend
          key: backend-${{ runner.os }}-x64-${{ hashFiles('backend-api/**/*.py', 'backend-api/requirements.txt') }}-pyhelios-${{ steps.submodules.outputs.sha }}

      - name: Install Python dependencies
        working-directory: backend-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # Test-only deps (not in requirements.txt / not shipped in the bundle).
          # pytest-cov is required because backend-api/pytest.ini's addopts pass
          # --cov=main / --cov-report / --cov-fail-under; without it pytest exits
          # with "unrecognized arguments" before collecting any test.
          pip install pytest pytest-cov httpx

      # Build libhelios from the submodule (needed by the backend bundle AND so
      # `import main` in the pytest conftest loads pyhelios rather than trying to
      # compile it mid-collection). Skipped when the backend bundle is cached.
      - name: Build PyHelios from source
        if: steps.backend-cache.outputs.cache-hit != 'true'
        run: node scripts/build-pyhelios.mjs

      # Reclaim disk + add swap before PyInstaller (it OOMs the ~7.8 GB runner
      # bundling scipy/open3d/skimage/pye57). Only needed when actually building
      # the bundle. See release.yml for the full rationale.
      - name: Free disk + add swap for PyInstaller
        if: steps.backend-cache.outputs.cache-hit != 'true'
        run: |
          set -x
          df -h / || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h || true

      - name: Build Python backend (PyInstaller bundle)
        if: steps.backend-cache.outputs.cache-hit != 'true'
        run: node scripts/build-backend.mjs

      - name: Compute PotreeConverter cache key
        id: potree-key
        shell: bash
        run: |
          if command -v sha256sum >/dev/null; then h=$(sha256sum scripts/build-potree-converter.mjs | cut -d' ' -f1); else h=$(shasum -a 256 scripts/build-potree-converter.mjs | cut -d' ' -f1); fi
          echo "key=$h" >> "$GITHUB_OUTPUT"

      - name: Cache PotreeConverter binary
        id: potree-cache
        uses: actions/cache@v4
        with:
          path: resources/potree_converter
          key: potree-${{ runner.os }}-x64-pr686-${{ steps.potree-key.outputs.key }}

      - name: Build PotreeConverter
        if: steps.potree-cache.outputs.cache-hit != 'true'
        run: node scripts/build-potree-converter.mjs

      # pytest imports backend-api/main.py, which loads the libhelios just built;
      # run under xvfb in case that load touches a display. Invoke pytest via the
      # CI Python (the `test:backend` npm script hardcodes a local venv that
      # doesn't exist on the runner).
      - name: Backend unit tests (pytest)
        working-directory: backend-api
        run: xvfb-run -a python -m pytest -v

      - name: Install frontend dependencies
        run: npm ci

      # E2E launches the real Electron app (dist-main/main.js) which spawns the
      # packaged backend — so the renderer/main/preload must be built first.
      - name: Build app (renderer + main + preload)
        run: npm run build

      # Electron needs a display; the E2E harness picks a free backend port and
      # drives the live supervised backend (no mocking).
      - name: E2E tests (Playwright + Electron)
        run: xvfb-run -a npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
